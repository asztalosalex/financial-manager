# HTTP -> HTTPS redirect
server {
  listen 80;
  server_name frontend.fmanager.local backend.fmanager.local;
  return 301 https://$host$request_uri;
}

# Frontend
server {
  listen 443 ssl;
  server_name frontend.fmanager.local;

  ssl_certificate /etc/nginx/certs/frontend.fmanager.local+1.pem;
  ssl_certificate_key /etc/nginx/certs/frontend.fmanager.local+1-key.pem;

  location /api/ {
    proxy_pass http://backend:8080/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://frontend:80;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# Backend (kozvetlen API elerese, pl. Swagger/Postman)
server {
  listen 443 ssl;
  server_name backend.fmanager.local;

  ssl_certificate /etc/nginx/certs/backend.fmanager.local.pem;
  ssl_certificate_key /etc/nginx/certs/backend.fmanager.local-key.pem;

  location / {
    proxy_pass http://backend:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
